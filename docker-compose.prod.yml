# SignalStack Production Monorepo Deployment
# Optimized for Proxmox VPS (Ubuntu VM)

services:
  # Database Layer
  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal # Change this in production!
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signalstack"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Layer (Optional, for future use)
  redis:
    image: redis:7-alpine
    container_name: signalstack-redis
    restart: unless-stopped

  # Backend Layer (NestJS)
  backend:
    build: ./backend
    container_name: signalstack-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://signal:signal@postgres:5432/signalstack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_ENABLED: ${AI_ENABLED:-true}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Frontend Layer (Next.js)
  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000 # On your VPS, this is the public URL
    container_name: signalstack-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000 # Same here, needs to be reachable from browser
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
