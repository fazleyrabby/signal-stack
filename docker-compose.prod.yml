services:
  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: always
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signalstack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalstack-redis
    restart: always

  app:
    build:
      context: ./backend
    container_name: signalstack-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://signal:signal@postgres:5432/signalstack"
      JWT_SECRET: "Ycf+9NJKyalh4HnXMrHkdJ79JgqDvwooPvtKUzWPllM="
      ADMIN_API_KEY: "dev-admin-key"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "https://api.fazleyrabbi.xyz"
    container_name: signalstack-frontend-1
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - app

volumes:
  pgdata: