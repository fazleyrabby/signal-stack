services:
  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: always
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signalstack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalstack-redis
    restart: always

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: signalstack-llama
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      -m /models/qwen.gguf
      -c 512
      -t 2
      --batch-size 32
      --ubatch-size 32
      --host 0.0.0.0
      --port 8080
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  app:
    build:
      context: ./backend
    container_name: signalstack-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://signal:signal@postgres:5432/signalstack"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@signalstack.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      FRONTEND_URL: "https://signal.fazleyrabbi.xyz"
      NODE_ENV: "production"
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LOCAL_AI_ENABLED: ${LOCAL_AI_ENABLED:-false}
      LOCAL_AI_URL: ${LOCAL_AI_URL:-http://llama:8080}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DISCORD_FILTER_TECH: ${DISCORD_FILTER_TECH:-false}
    volumes:
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      llama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.fazleyrabbi.xyz}
    container_name: signalstack-frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      API_BACKEND_URL: "http://signalstack-app:3000"
      NODE_ENV: "production"
    depends_on:
      - app

  logs:
    image: amir20/dozzle:latest
    container_name: signalstack-logs
    restart: unless-stopped
    ports:
      - "9999:8080"
    environment:
      DOZZLE_AUTH_PROVIDER: simple
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dozzle/users.yml:/data/users.yml

volumes:
  pgdata:
  models:
  backups:
