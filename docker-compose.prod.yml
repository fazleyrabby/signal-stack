# SignalStack Production Deployment
# Optimized for Proxmox VPS — fully isolated, zero volume mounts for app code
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signalstack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalstack-redis
    restart: unless-stopped

  app:
    build: ./backend
    container_name: signalstack-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://signal:${POSTGRES_PASSWORD:-signal}@postgres:5432/signalstack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_ENABLED: ${AI_ENABLED:-true}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: signalstack-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      PORT: 3001
    depends_on:
      - app

volumes:
  pgdata:
