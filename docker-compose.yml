services:
  app:
    build: ./backend
    container_name: signalstack-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://signal:signal@postgres:5432/signalstack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: development
      LOCAL_AI_ENABLED: ${LOCAL_AI_ENABLED:-false}
      LOCAL_AI_URL: ${LOCAL_AI_URL:-http://llama:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      API_BACKEND_URL: http://signalstack-app:3000
      PORT: 3001
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U signal -d signalstack']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: signalstack-redis
    ports:
      - '6380:6379'

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: signalstack-llama
    ports:
      - '8080:8080'
    volumes:
      - ./models:/models
    command: >
      -m /models/qwen.gguf
      -c 1024
      -t 2
      --batch-size 64
      --host 0.0.0.0
      --port 8080
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
