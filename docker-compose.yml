services:
  app:
    build: ./backend
    container_name: signalstack-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://signal:signal@postgres:5432/signalstack
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "npx drizzle-kit push && npm run start:dev"

  frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    container_name: signalstack-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      PORT: 3001
    depends_on:
      - app
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: signalstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signalstack
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U signal -d signalstack']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: signalstack-redis
    ports:
      - '6380:6379'

volumes:
  pgdata:
